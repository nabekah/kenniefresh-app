[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install -g pnpm@10.4.1 --ignore-scripts",
  "export PATH=$(npm root -g)/.bin:$PATH && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["export PATH=$(npm root -g)/.bin:$PATH && pnpm build"]

[start]
cmd = "node dist/index.js"
